# Copal repo configuration.
# debug = true  → the base data directory is repo-local ./db/
# debug = false → the base data directory is ~/.local/share/copal/
# The standalone Servo shell uses <base>/standalone/ so its default cannot
# collide with OpenClank's hosted store. COPAL_DB=/path is an exact operator
# override and does not receive the standalone suffix; COPAL_DEBUG=0|1 beats
# this file when no explicit database path is set.
debug = true
