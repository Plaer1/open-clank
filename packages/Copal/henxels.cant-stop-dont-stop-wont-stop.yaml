# Manual-only contract. Do not import this from henxels.yaml.
# yaml-language-server: $schema=./.henxels/henxels.schema.json

imports:
  - .henxels/cant_stop_checks.py

settings:
  ask_me_before_staging: true
  confirm_before_push: true
  confirm_before_deleting:
    over_lines: 5

henxels:
  - henxel: "cant stop dont stop wont stop manual contract exists"
    in: ./
    required_files:
      - .henxels/manual/cant-stop-dont-stop-wont-stop.md
      - henxels.cant-stop-dont-stop-wont-stop.yaml
      - .henxels/cant_stop_checks.py

  - henxel: "engaged recursive plans carry cant stop dont stop wont stop"
    in: ./.futures/*
    allowed_filetypes: .md
    cant_stop_dont_stop_wont_stop: true
